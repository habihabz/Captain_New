<div class="payment-outcome-wrapper py-5">
    <div class="container py-5 mt-lg-5">
        <div class="row justify-content-center text-center">
            <div class="col-md-7 col-lg-5">
                <div class="card border-0 shadow-sm overflow-hidden" 
                     style="background: linear-gradient(135deg, #ffffff 0%, #f1f3f5 100%);">
                    
                    <!-- TOP ACCENT BAR -->
                    <div class="bg-success opacity-75" style="height: 6px;"></div>

                    <div class="card-body p-4 p-md-5">
                        <!-- SUCCESS ICON AREA -->
                        <div class="outcome-icon-container mb-4">
                            <div class="success-icon-ring mx-auto d-flex align-items-center justify-content-center">
                                <i class="fa fa-shopping-bag text-success" style="font-size: 52px; opacity: 0.9;"></i>
                            </div>
                        </div>

                        <h2 class="fw-bold text-dark mb-2">Order Confirmed</h2>
                        <p class="text-muted mb-4 px-lg-3">Your transaction was successful. Your premium selection is being prepared for shipment.</p>

                        <!-- ORDER QUICK INFO -->
                        <div class="bg-white border p-3 mb-4 text-start" style="border-radius: 0;">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="fw-bold mb-0 text-dark small"><i class="fa fa-cube me-2 text-success"></i> Preparing Package</h6>
                                    <p class="text-muted mb-0 mt-1" style="font-size: 11px;">You will receive an email confirmation shortly.</p>
                                </div>
                            </div>
                        </div>

                        <!-- ACTIONS -->
                        <div class="d-grid gap-3">
                            <button routerLink="/my-orders" class="btn btn-dark py-3 fw-bold btn-premium-action shadow-sm" style="border-radius: 0; letter-spacing: 1px;">
                                <i class="fa fa-truck me-2"></i> TRACK YOUR ORDER
                            </button>
                            <button routerLink="/shop" class="btn btn-outline-secondary py-2 fw-medium" style="border-radius: 0; font-size: 13px; border-color: #dee2e6;">
                                <i class="fa fa-shopping-bag me-1"></i> Continue Shopping
                            </button>
                        </div>

                    </div>
                </div>

                <div class="mt-4 pt-2">
                    <p class="text-muted small">Need another receipt? <a href="#" class="text-decoration-none text-dark fw-bold">Download PDF</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
