<div class="global-breadcrumb-wrapper">
  <div class="container-fluid px-lg-5">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/web-home">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Favourites</li>
      </ol>
    </nav>
  </div>
</div>

<div class="container-fluid px-lg-5 py-4" style="min-height: 80vh;">
    <div class="container py-4">
        
        <!-- Header -->
        <div class="row mb-4 align-items-center border-bottom pb-3">
            <div class="col-8">
                <h3 class="fw-bold mb-0">My Favourites</h3>
            </div>
            <div class="col-4 text-end">
                <span class="text-muted fw-semibold px-3 py-1 bg-light rounded-pill">{{ favourites.length }} Items</span>
            </div>
        </div>

        <div class="row">
            <!-- Empty state -->
            <div class="col-12 text-center py-5 mt-4" *ngIf="favourites.length === 0">
                <i class="fa fa-heart-o text-muted mb-4" style="font-size: 5rem; opacity: 0.5;"></i>
                <h3 class="fw-bold text-dark mb-2">It's empty here!</h3>
                <p class="text-muted fs-5 mb-4">You haven't saved any items to your favourites yet.</p>
                <button class="btn btn-dark btn-lg rounded-pill px-5 shadow-sm" routerLink="/shop">Explore Products</button>
            </div>

            <!-- Grid -->
            <div class="row" *ngIf="favourites.length > 0">
                <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 mb-3" *ngFor="let fav of favourites">
                    <div class="card border-0 shadow-sm rounded-3 overflow-hidden h-100" style="transition: transform 0.3s ease;">
                        
                        <!-- Image Wrapper -->
                        <div class="text-center bg-white p-2 w-100 position-relative">
                            
                            <!-- Delete Button (floating) -->
                            <button (click)="removeFavourite(fav.f_id)" class="btn btn-white text-danger position-absolute top-0 end-0 m-1 rounded-circle shadow-sm border-0 d-flex align-items-center justify-content-center" style="z-index: 10; width: 30px; height: 30px;">
                                <i class="fa fa-trash" style="font-size: 12px;"></i>
                            </button>

                            <a class="cursor-pointer" (click)="navigateToProduct(fav.p_id)">
                                <img *ngFor="let att of getAttachementOfaProduct(fav.p_attachements)?.slice(0, 1);"
                                     [src]="apiUrl + '/' + att.pa_image_path" 
                                     alt="product_image" 
                                     style="height: 120px; width: 100%; object-fit: contain; margin: 0 auto;">
                            </a>
                        </div>

                        <!-- Info Wrapper -->
                        <div class="card-body p-2 pt-0 bg-white d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <div class="text-truncate me-2">
                                    <span class="text-muted text-uppercase" style="font-size: 10px; letter-spacing: 0.5px; font-weight: 700;">
                                        {{ fav.p_sub_category_name }}
                                    </span>
                                </div>
                            </div>
                            
                            <div class="border-top pt-2 mt-1 flex-grow-1 d-flex flex-column">
                                <h6 class="fw-bold text-dark text-truncate mb-1 cursor-pointer" style="font-size: 13px;" (click)="navigateToProduct(fav.p_id)">
                                    {{ fav.p_name }}
                                </h6>
                                
                                <div class="d-flex justify-content-between align-items-center mt-auto pt-1">
                                    <h6 class="fw-bold text-success mb-0 d-inline-flex align-items-center" style="font-size: 14px;">
                                        <span class="me-1 text-muted" style="font-size: 12px;">&#x20B9;</span> {{ fav.p_price }}
                                    </h6>
                                    
                                    <button class="btn btn-dark btn-sm rounded-pill px-2 py-0 shadow-none fw-semibold" style="font-size: 11px;" (click)="navigateToProduct(fav.p_id)">
                                        View
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
