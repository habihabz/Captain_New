<div class="auth-wrapper d-flex flex-column align-items-center justify-content-center py-5">
    <div class="auth-container">
        <!-- Auth Card -->
        <div class="card auth-card border-0 shadow-lg rounded-5 overflow-hidden">
            <div class="card-body p-4 p-md-5 text-center">
                
                <!-- Brand Header -->
                <div class="brand-section mb-3">
                    <img src="/images/captain.png" alt="Captain Logo" class="brand-logo mb-2" />
                    <h4 class="fw-bold text-dark mb-1">Create Your Account</h4>
                    <p class="text-muted x-small">Now let's make you a Captain Member.</p>
                </div>

                <form #regForm="ngForm" class="text-start">

                    <div class="row g-3">
                        
                        <!-- Full Name -->
                        <div class="col-md-6 mb-1">
                            <label class="auth-label">NAME</label>
                            <div class="input-group-auth">
                                <span class="input-icon"><i class="fa fa-user-o"></i></span>
                                <input type="text" class="form-control auth-input" name="u_name" id="u_name" 
                                       placeholder="Enter your full name" required [(ngModel)]="user.u_name" />
                            </div>
                        </div>

                        <!-- Username -->
                        <div class="col-md-6 mb-1">
                            <label class="auth-label">USERNAME</label>
                            <div class="input-group-auth">
                                <span class="input-icon"><i class="fa fa-user-circle-o"></i></span>
                                <input type="text" class="form-control auth-input" id="username" name="username" 
                                       placeholder="Choose a username" required [(ngModel)]="user.u_username" />
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="col-md-6 mb-1">
                            <label class="auth-label">EMAIL</label>
                            <div class="input-group-auth">
                                <span class="input-icon"><i class="fa fa-envelope-o"></i></span>
                                <input type="email" class="form-control auth-input" id="u_email" name="u_email" 
                                       placeholder="Enter your email" required [(ngModel)]="user.u_email" />
                            </div>
                        </div>

                        <!-- Phone -->
                        <div class="col-md-6 mb-1">
                            <label class="auth-label">PHONE</label>
                            <div class="input-group-auth">
                                <span class="input-icon"><i class="fa fa-phone"></i></span>
                                <input type="tel" class="form-control auth-input" name="u_phone" id="u_phone" 
                                       placeholder="Enter your phone number" required [(ngModel)]="user.u_phone" />
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="col-md-6 mb-1">
                            <label class="auth-label">PASSWORD</label>
                            <div class="input-group-auth">
                                <span class="input-icon"><i class="fa fa-lock"></i></span>
                                <input type="password" class="form-control auth-input" id="u_password" name="u_password" 
                                       placeholder="••••••••" required [(ngModel)]="user.u_password" />
                            </div>
                        </div>

                        <!-- Date of Birth -->
                        <div class="col-md-6 mb-1">
                            <label class="auth-label">DATE OF BIRTH</label>
                            <div class="input-group-auth">
                                <span class="input-icon"><i class="fa fa-calendar-o"></i></span>
                                <input type="date" class="form-control auth-input" id="u_date_of_birth" name="u_date_of_birth" 
                                       required [(ngModel)]="user.u_date_of_birth" />
                            </div>
                        </div>

                        <!-- Consents -->
                        <div class="col-12 mb-3 mt-3">
                            <div class="form-check custom-check mb-2">
                                <input class="form-check-input" type="checkbox" name="u_is_get_updates" id="u_is_get_updates" [(ngModel)]="is_get_updates">
                                <label class="form-check-label x-small" for="u_is_get_updates" style="font-size: 11px;">
                                    I want to receive product updates and Captain member benefits.
                                </label>
                            </div>
                            <div class="form-check custom-check">
                                <input class="form-check-input" type="checkbox" id="u_agree_terms" name="u_agree_terms" required [(ngModel)]="agree_terms">
                                <label class="form-check-label x-small" for="u_agree_terms" style="font-size: 11px;">
                                    I agree to the <a href="#" class="text-primary text-decoration-none">Terms & Conditions</a>.
                                </label>
                            </div>
                        </div>

                        <!-- Action -->
                        <div class="col-12 mb-2">
                            <button type="submit" class="btn btn-teal btn-auth w-100 py-3 rounded-pill fw-bold text-uppercase shadow-sm" 
                                    (click)="registerUser()" [disabled]="!regForm.form.valid || !agree_terms">
                                SECURE SIGNUP <i class="fa fa-arrow-right ms-2 fs-xs"></i>
                            </button>
                        </div>
                        
                        <div class="col-12 text-center mt-2">
                            <p class="small text-muted mb-3">Already have an account? 
                                <a routerLink="/login" class="text-dark fw-bold text-decoration-none">Log In Now</a>
                            </p>
                            <p class="copyright-text mt-3">© 2026 Captain ERP. All rights reserved.</p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
