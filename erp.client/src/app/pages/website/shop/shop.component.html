<div class="container-fluid" style="min-height: 70vh; padding-bottom: 120px;">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb bg-light px-3 py-2 rounded">
      <li class="breadcrumb-item">
        <a routerLink="/home">Home</a>
      </li>
      <li class="breadcrumb-item active" aria-current="page">
        Shop
      </li>
    </ol>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-12 col-sm-12">
        <div class="filter-container d-flex justify-content-end">
          <div class="filter-rating" style="margin: 10px;">
            <select id="ratingFilter" [(ngModel)]="sortBy" (change)="getProductsByFilters()" class="form-control">
              <option value="0">Sort By</option>
              <option value="1">Featured</option>
              <option value="2">Popularity</option>
              <option value="3">Newest</option>
              <option value="4">Price : Hight-Low</option>
              <option value="5">Price : Low-High</option>
            </select>
          </div>
        </div>

      </div>
      <div class="row" style="height: 100%;">
        <!-- Filter Sidebar -->
        <div class="col-md-3 col-sm-4 shop-sidebar">
          <div class="filter-card shadow-sm rounded-4 bg-white p-3 mb-4">
            <h5 class="fw-bold mb-4 text-dark d-flex align-items-center">
              <i class="fa fa-filter me-2 text-primary"></i> Filters
            </h5>

            <!-- HIERARCHICAL TREE -->
            <div class="hierarchy-container">
              <div *ngFor="let cat of hierarchy" class="tree-node border-bottom border-light py-2">
                <div class="d-flex align-items-center gap-2 py-1">
                  <i class="fa cursor-pointer text-muted" 
                     [ngClass]="cat.isOpen ? 'fa-chevron-down' : 'fa-chevron-right'"
                     style="font-size: 10px; width: 12px;"
                     (click)="toggleNode(cat)"></i>
                  <div class="custom-control custom-checkbox d-flex align-items-center">
                    <input type="checkbox" class="custom-control-input" [id]="'cat-'+cat.id"
                           [checked]="isCategorySelected(cat.id)" (change)="onCategoryChange($event, cat.id)">
                    <label class="custom-control-label fw-bold small text-dark cursor-pointer ms-2 mb-0" [for]="'cat-'+cat.id" 
                           (click)="toggleNode(cat)">{{ cat.name }}</label>
                  </div>
                </div>

                <!-- LEVEL 2: SUBCATEGORY -->
                <div class="ms-4 tree-children" *ngIf="cat.isOpen">
                  <div *ngFor="let sub of cat.children" class="tree-node py-1">
                    <div class="d-flex align-items-center gap-2">
                      <i class="fa cursor-pointer text-muted" 
                         [ngClass]="sub.isOpen ? 'fa-minus' : 'fa-plus'"
                         style="font-size: 8px; width: 12px;"
                         (click)="toggleNode(sub)"></i>
                      <div class="custom-control custom-checkbox d-flex align-items-center">
                        <input type="checkbox" class="custom-control-input" [id]="'sub-'+sub.id"
                               [checked]="isSubCategorySelected(sub.id)" (change)="onSubCategoryChange($event, sub.id)">
                        <label class="custom-control-label small text-muted cursor-pointer ms-2 mb-0" [for]="'sub-'+sub.id"
                               (click)="toggleNode(sub)">{{ sub.name }}</label>
                      </div>
                    </div>

                    <!-- LEVEL 3: DIVISION -->
                    <div class="ms-3 tree-children" *ngIf="sub.isOpen">
                      <div *ngFor="let div of sub.children" class="tree-node py-1">
                        <div class="d-flex align-items-center gap-2">
                          <i class="fa cursor-pointer text-muted-extra" 
                             [ngClass]="div.isOpen ? 'fa-caret-down' : 'fa-caret-right'"
                             style="font-size: 10px; width: 10px;"
                             (click)="toggleNode(div)"></i>
                          <div class="custom-control custom-checkbox d-flex align-items-center">
                            <input type="checkbox" class="custom-control-input" [id]="'div-'+div.id"
                                   [checked]="isDivisionSelected(div.id)" (change)="onDivisionChange($event, div.id)">
                            <label class="custom-control-label x-small text-muted cursor-pointer ms-2 mb-0" [for]="'div-'+div.id" 
                                   style="font-size: 11px;" (click)="toggleNode(div)">{{ div.name }}</label>
                          </div>
                        </div>

                        <!-- LEVEL 4: SUB DIVISION -->
                        <div class="ms-3 tree-children" *ngIf="div.isOpen">
                          <div *ngFor="let sdiv of div.children" class="tree-node py-1">
                            <div class="custom-control custom-checkbox ms-2 d-flex align-items-center">
                              <input type="checkbox" class="custom-control-input" [id]="'sdiv-'+sdiv.id"
                                     [checked]="isSubDivisionSelected(sdiv.id)" (change)="onSubDivisionChange($event, sdiv.id)">
                              <label class="custom-control-label xx-small text-muted cursor-pointer ms-2 mb-0" [for]="'sdiv-'+sdiv.id" 
                                     style="font-size: 10px;">{{ sdiv.name }}</label>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- SIZE SECTION -->
            <div class="mt-4 pt-3 border-top">
              <h6 class="fw-bold mb-3 small text-uppercase" style="letter-spacing: 1px;">By Size</h6>
              <div class="d-flex flex-wrap gap-2">
                <div *ngFor="let sz of sizes" class="size-chip" [ngClass]="{'active': selectedSizeIds.includes(sz.md_id)}">
                  <input type="checkbox" [id]="'sz-'+sz.md_id" class="d-none"
                         (change)="onSizeChange($event, sz.md_id)">
                  <label [for]="'sz-'+sz.md_id" class="cursor-pointer px-3 py-1 border rounded-pill small transition-all">
                    {{ sz.md_name }}
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Products Area -->
        <div class="col-md-9 col-sm-8">
          <div class="row">
            <div *ngFor="let product of this.products" class="col-md-3 col-sm-12">
              <div class="product">
                <div class="product__thumb">
                  <a>
                    <img
                      *ngFor="let p_attachement of getAttachementOfaProduct(product.p_attachements).slice(0, 2); let i = index"
                      [ngClass]="i === 0 ? 'product-primary' : 'product-secondary'"
                      [src]="apiUrl + '/' + p_attachement.pa_image_path" alt="product_image"
                      style="height: 200px; width: auto;">
                  </a>
                  <div class="product-info mb-10">
                    <div class="product_category">
                      <span>{{ product.p_sub_category_name + ', ' + product.p_division_name
                        }}</span>
                    </div>
                    <div class="product_rating">
                      <a href="#"><i class="fa fa-star start-color"></i></a>
                      <a href="#"><i class="fa fa-star start-color"></i></a>
                      <a href="#"><i class="fa fa-star start-color"></i></a>
                      <a href="#"><i class="fa fa-star"></i></a>
                      <a href="#"><i class="fa fa-star"></i></a>
                    </div>
                  </div>
                  <div class="product__name">
                    <h4><a href="shop.html">{{product.p_name}}</a></h4>
                    <div class="pro-price">
                      <p class="p-absoulute pr-1"><span>&#x20B9;</span>{{product.p_price}}</p>
                      <a class="p-absoulute pr-2" (click)="navigateToProduct(product.p_id)">View</a>
                    </div>
                  </div>
                  <div class="product__action">
                    <div class="inner__action">
                      <div class="wishlist">
                        <a (click)="addToFavourites(product.p_id)"><i class="fa fa-heart"></i></a>
                      </div>
                      <div class="view">
                        <a (click)="navigateToProduct(product.p_id)"><i class="fa fa-eye"></i></a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
