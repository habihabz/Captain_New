<div class="right_col d-flex flex-column" role="main" style="padding-top: 10px; height: 100vh; overflow: hidden;">
  <!-- Breadcrumbs -->
  <div class="row mb-4 flex-shrink-0">
    <div class="col-12 px-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-transparent p-0 m-0">
          <li class="breadcrumb-item text-muted small">Admin Console</li>
          <li class="breadcrumb-item active text-dark fw-bold small" aria-current="page">System Configuration</li>
        </ol>
      </nav>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <h3 class="fw-bold text-dark m-0">Constant Values</h3>
        <div class="d-flex gap-2 align-items-center">
            <span class="text-muted small fw-bold">Environment:</span>
            <span class="badge bg-soft-warning text-warning px-4 py-2 rounded-pill fw-bold" style="background: rgba(251, 99, 64, 0.15); font-size: 13px;">{{ constantsValues.length }} Variables</span>
        </div>
      </div>
    </div>
  </div>

  <div class="x_panel border-0 shadow-sm rounded-4 mx-2 mb-3 flex-grow-1 d-flex flex-column overflow-hidden">
    <div class="x_title border-0 pb-0 px-3 pt-4 flex-shrink-0">
      <div class="row align-items-center">
        <div class="col">
          <button class="btn btn-warning btn-pill shadow-sm hover-lift px-4 fw-bold" (click)="openCreateModal()">
            <i class="fa fa-plus-circle me-1"></i> CREATE CONSTANT
          </button>
        </div>
      </div>
      <div class="clearfix"></div>
    </div>
    <div class="x_content p-3 flex-grow-1 overflow-hidden">
        <ag-grid-angular #constantGrid class="ag-theme-quartz ag-theme-acmecorp" 
            style="width: 100%; height: 100%;"
            [rowData]="constantsValues" [columnDefs]="colDefs" [pagination]="pagination"
            [defaultColDef]="defaultColDef" [enableCellTextSelection]="true"
            [components]="frameworkComponents" [paginationPageSize]="10"
            (gridReady)="onGridReady($event)">
        </ag-grid-angular>
    </div>
  </div>
</div>

<!-- CONSTANT MODAL -->
<div class="modal fade" id="constantModal"  aria-hidden="true">
    <div class="modal-dialog modal-md">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5 class="modal-title">
                    {{ constantValue.cv_id === 0 ? 'Create Constant Value' : 'Update Constant Value' }}
                </h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>

            <!-- BODY -->
            <div class="modal-body">

                <!-- NAME -->
                <div class="form-group">
                    <label>Constant Name</label>
                    <select appSelect2 class="form-control" [(ngModel)]="constantValue.cv_name" id="cv_name" name="cv_name"
                        (selectionChanged)="onConstantNameChange($event);">
                        <option value="">Select Constant</option>
                        <option *ngFor="let c of constantNameList" [value]="c">
                            {{ c }}
                        </option>
                    </select>
                </div>

                <!-- VALUE -->
                <div class="form-group mt-3">
                    <label>Constant Value</label>
                    <textarea type="text" class="form-control" [(ngModel)]="constantValue.cv_value"
                         rows="10"></textarea>
                </div>

                <!-- STATUS -->
                <div class="form-group mt-3" *ngIf="constantValue.cv_id != 0">
                    <label>Status</label>
                    <select class="form-control" [(ngModel)]="constantValue.cv_active_yn">
                        <option value="Y">Active</option>
                        <option value="N">Inactive</option>
                    </select>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
                <button class="btn btn-primary" (click)="createOrUpdateConstantValue()">
                    <i class="fa fa-save"></i> Save
                </button>
                <button class="btn btn-secondary" data-dismiss="modal">
                    Close
                </button>
            </div>

        </div>
    </div>
</div>
