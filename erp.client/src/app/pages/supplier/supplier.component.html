<div class="right_col" role="main" style="min-height: 99vh; padding-top: 10px;">
  <!-- Breadcrumbs -->
  <div class="row mb-4">
    <div class="col-12 px-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-transparent p-0 m-0">
          <li class="breadcrumb-item text-muted small">Admin Console</li>
          <li class="breadcrumb-item active text-dark fw-bold small" aria-current="page">Supplier Management</li>
        </ol>
      </nav>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <h3 class="fw-bold text-dark m-0">Global Partners</h3>
        <div class="d-flex gap-2 align-items-center">
            <span class="text-muted small fw-bold">Active Vendors:</span>
            <span class="badge bg-soft-success text-success px-4 py-2 rounded-pill fw-bold" style="background: rgba(45, 206, 137, 0.15); font-size: 13px;">{{ suppliers.length }} Entities</span>
        </div>
      </div>
    </div>
  </div>

  <div class="x_panel border-0 shadow-sm rounded-4 mx-2">
    <div class="x_title border-0 pb-0 px-3 pt-4">
      <div class="row align-items-center">
        <div class="col">
          <button class="btn-create shadow-sm hover-lift" (click)="createSupplier()">
            <i class="fa fa-truck"></i> CREATE NEW SUPPLIER
          </button>
        </div>
      </div>
      <div class="clearfix"></div>
    </div>
    <div class="x_content">
      <div class="row">
        <div class="col-12">
          <ag-grid-angular
            #supplierGrid
            style="width: 100%; height: 75vh;"
            class="ag-theme-quartz ag-theme-acmecorp"
            [rowData]="suppliers"
            [columnDefs]="colDefs"
            [pagination]="pagination"
            [defaultColDef]="defaultColDef"
            [components]="frameworkComponents"
            [domLayout]="domLayout"
            (gridReady)="onGridReady($event)">
          </ag-grid-angular>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- modal.component.html -->

<div class="modal fade" id="supplierFormModal" tabindex="-1" supplier="dialog" aria-labelledby="supplierFormModalLabel"
  aria-hidden="true">
  <div class="modal-dialog" supplier="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="supplierFormModalLabel">{{ supplier.s_id ? 'Update Supplier' : 'Create Supplier' }}
        </h5>
      </div>
      <div class="modal-body">
        <form #userForm="ngForm">
          <div class="form-group">
            <label for="s_name">Name</label>
            <input type="text" id="s_name" class="form-control" [(ngModel)]="supplier.s_name" name="s_name" required>
            <div class="invalid-feedback" *ngIf="userForm.submitted && !supplier.s_name">
              Name is required
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer d-flex justify-content-end">
        <button type="submit" class="btn btn-primary" (click)="createOrUpdateSupplier()">Save</button>
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
