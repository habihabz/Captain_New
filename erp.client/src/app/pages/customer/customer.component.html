<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="mb-1 fw-bold text-dark">Customer Management</h4>
        <p class="text-muted small mb-0">View and manage system customers from the unified users table</p>
      </div>
      <button class="btn btn-primary shadow-sm px-4 rounded-pill" (click)="createCustomer()">
        <i class="fa fa-plus me-2"></i> Register New Customer
      </button>
    </div>
  
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="card-body p-0">
        <ag-grid-angular style="width: 100%; height: 65vh;" class="ag-theme-alpine" [columnDefs]="colDefs"
          [rowData]="customers" [pagination]="pagination" [domLayout]="domLayout" [defaultColDef]="defaultColDef"
          (gridReady)="onGridReady($event)">
        </ag-grid-angular>
      </div>
    </div>
  </div>
  
  <!-- Customer Form Modal -->
  <div class="modal fade" id="customerFormModal" tabindex="-1" aria-labelledby="customerFormModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg rounded-4">
        <div class="modal-header border-bottom-0 pt-4 px-4">
          <h5 class="modal-title fw-bold" id="customerFormModalLabel">{{ customer.u_id ? 'Update Customer' : 'Register New Customer' }}</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body px-4 pb-4">
          <form #userForm="ngForm">
            <div class="form-group mb-3">
              <label class="small fw-bold text-muted mb-1">FULL NAME</label>
              <input type="text" id="u_name" class="form-control bg-light border-0 py-2 px-3 rounded-3" 
                [(ngModel)]="customer.u_name" name="u_name" placeholder="Enter customer name" required>
            </div>
            <div class="form-group mb-3">
                <label class="small fw-bold text-muted mb-1">EMAIL ADDRESS</label>
                <input type="email" id="u_email" class="form-control bg-light border-0 py-2 px-3 rounded-3" 
                  [(ngModel)]="customer.u_email" name="u_email" placeholder="email@example.com">
            </div>
            <div class="form-group mb-3">
                <label class="small fw-bold text-muted mb-1">PHONE NUMBER</label>
                <input type="text" id="u_phone" class="form-control bg-light border-0 py-2 px-3 rounded-3" 
                  [(ngModel)]="customer.u_phone" name="u_phone" placeholder="+91 00000 00000">
            </div>
          </form>
        </div>
        <div class="modal-footer border-top-0 px-4 pb-4">
          <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary rounded-pill px-4" (click)="createOrUpdateCustomer()"
            [disabled]="!userForm.form.valid">
            {{ customer.u_id ? 'Save Changes' : 'Register Customer' }}
          </button>
        </div>
      </div>
    </div>
  </div>
