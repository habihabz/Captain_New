<div class="right_col d-flex flex-column" role="main" style="padding-top: 10px; height: 100vh; overflow: hidden;">
  <!-- Breadcrumbs -->
  <div class="row mb-4 flex-shrink-0">
    <div class="col-12 px-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-transparent p-0 m-0">
          <li class="breadcrumb-item text-muted small">Admin Console</li>
          <li class="breadcrumb-item active text-dark fw-bold small" aria-current="page">Customer Management</li>
        </ol>
      </nav>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <h3 class="fw-bold text-dark m-0">Customer Base</h3>
        <div class="d-flex gap-2 align-items-center">
            <span class="text-muted small fw-bold">Market Reach:</span>
            <span class="badge bg-soft-primary text-primary px-4 py-2 rounded-pill fw-bold" style="background: rgba(94, 114, 228, 0.15); font-size: 13px;">{{ customers.length }} Clients</span>
        </div>
      </div>
    </div>
  </div>

  <div class="x_panel border-0 shadow-sm rounded-4 mx-2 mb-3 flex-grow-1 d-flex flex-column overflow-hidden">
    <div class="x_title border-0 pb-0 px-3 pt-4 flex-shrink-0">
      <div class="row align-items-center">
        <div class="col">
          <button class="btn-create shadow-sm hover-lift px-4" (click)="createCustomer()">
            <i class="fa fa-user-plus me-1"></i> CREATE NEW CUSTOMER
          </button>
        </div>
      </div>
      <div class="clearfix"></div>
    </div>
    <div class="x_content">
      <div class="row">
        <div class="col-12">
          <ag-grid-angular
            #customerGrid
            style="width: 100%; height: 75vh;"
            class="ag-theme-quartz ag-theme-acmecorp"
            [rowData]="customers"
            [columnDefs]="colDefs"
            [pagination]="pagination"
            [defaultColDef]="defaultColDef"
            [components]="frameworkComponents"
            [domLayout]="domLayout"
            (gridReady)="onGridReady($event)">
          </ag-grid-angular>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- modal.component.html -->

<div class="modal fade" id="customerFormModal" tabindex="-1" customer="dialog" aria-labelledby="customerFormModalLabel"
  aria-hidden="true">
  <div class="modal-dialog" customer="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="customerFormModalLabel">{{ customer.c_id ? 'Update Customer' : 'Create Customer' }}
        </h5>
      </div>
      <div class="modal-body">
        <form #userForm="ngForm">
          <div class="form-group">
            <label for="c_name">Name</label>
            <input type="text" id="c_name" class="form-control" [(ngModel)]="customer.c_name" name="c_name" required>
            <div class="invalid-feedback" *ngIf="userForm.submitted && !customer.c_name">
              Name is required
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer d-flex justify-content-end">
        <button type="submit" class="btn btn-primary" (click)="createOrUpdateCustomer()">Save</button>
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
