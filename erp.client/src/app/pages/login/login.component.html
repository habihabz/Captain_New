<div class="login-page-container">
  <div class="login-card-glass animate__animated animate__fadeIn">
    <div class="login-header text-center mb-5">
      <img src="assets/img/logo/logo_black.png" alt="Captain Logo" class="login-logo mb-4" />
      <h3 class="fw-bold text-dark mb-2">Welcome Back</h3>
      <p class="text-muted small">Please sign in to continue</p>
    </div>

    <form class="login-form">
      <div class="form-group mb-4">
        <label class="login-label">Username</label>
        <div class="input-group-premium">
          <i class="fa fa-envelope-o"></i>
          <input type="text" class="form-control" placeholder="Enter your username" 
                 [(ngModel)]="credential.username" name="username" required autocomplete="off" />
        </div>
      </div>

      <div class="form-group mb-5">
        <label class="login-label d-flex justify-content-between">
          Password
          <a class="text-teal text-decoration-none" style="cursor: pointer; font-size: 11px;">FORGOT?</a>
        </label>
        <div class="input-group-premium">
          <i class="fa fa-lock"></i>
          <input type="password" class="form-control" placeholder="••••••••" 
                 [(ngModel)]="credential.password" name="password" required />
        </div>
      </div>

      <button type="button" class="btn btn-primary btn-pill w-100 py-3 shadow mb-4 fw-bold" (click)="onLogin()">
        SECURE LOGIN <i class="fa fa-arrow-right ms-2 small"></i>
      </button>

      <div class="text-center">
        <p class="text-muted small mb-0">Don't have an account?</p>
        <a (click)="navigateTo('user-registration')" class="text-teal fw-bold small text-decoration-none" style="cursor: pointer;">
          Create New Account
        </a>
      </div>
    </form>

    <div class="login-footer text-center mt-5 pt-4">
      <p class="text-muted mb-0">© 2026 Captain ERP. All rights reserved.</p>
    </div>
  </div>
</div>
