<div class="right_col" role="main" style="min-height: 99vh; padding-top: 10px;">
  <!-- Breadcrumbs -->
  <div class="row mb-4">
    <div class="col-12 px-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-transparent p-0 m-0">
          <li class="breadcrumb-item text-muted small">Admin Console</li>
          <li class="breadcrumb-item active text-dark fw-bold small" aria-current="page">Role Management</li>
        </ol>
      </nav>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <h3 class="fw-bold text-dark m-0">Access Control</h3>
        <div class="d-flex gap-2 align-items-center">
            <span class="text-muted small fw-bold">Security Context:</span>
            <span class="badge bg-soft-warning text-warning px-4 py-2 rounded-pill fw-bold" style="background: rgba(251, 99, 64, 0.15); font-size: 13px;">Permissions Active</span>
        </div>
      </div>
    </div>
  </div>

  <div class="x_panel border-0 shadow-sm rounded-4 mx-2">
    <div class="x_title border-0 pb-0 px-3 pt-4">
      <div class="row align-items-center">
        <div class="col">
          <button class="btn-create shadow-sm hover-lift" (click)="createRole()">
            <i class="fa fa-shield"></i> CREATE NEW ROLE
          </button>
        </div>
      </div>
      <div class="clearfix"></div>
    </div>

  <!-- modal.component.html -->
 
  <div class="modal fade" id="roleFormModal" tabindex="-1" role="dialog" aria-labelledby="roleFormModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="roleFormModalLabel">{{ role.r_id ? 'Update Role' : 'Create Role' }}</h5>
        </div>
        <div class="modal-body">
          <form  #userForm="ngForm">
            <div class="form-group">
              <label for="r_name">Name</label>
              <input type="text" id="r_name" class="form-control" [(ngModel)]="role.r_name" name="r_name" required>
              <div class="invalid-feedback" *ngIf="userForm.submitted && !role.r_name">
                Name is required
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer d-flex justify-content-end">
            <button type="submit" class="btn btn-primary" (click)="createOrUpdateRole()">Save</button>
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        </div>
      </div>
