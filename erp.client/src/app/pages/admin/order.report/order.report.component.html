<div class="right_col" role="main" style="min-height: 100vh;">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a>Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Order Report</li>
        </ol>
    </nav>
    <div class="x_panel">
        <div class="x_content" style="display: block;">

            <div class="row">
                <div class="col-md-2">
                    <div class="form-group">
                        <label for="rp_order_status">Customer Order Status</label>
                        <select appSelect2 id="rp_order_status" class="form-control" name="rp_order_status" required
                            (selectionChanged)="onOrderStatusChange($event);">
                            <option [value]="0">All</option>
                            <option *ngFor="let c of customerOrderStatuses" [value]="c.cos_id">{{ c.cos_name }}</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="nrp_report_type">Report Type</label>
                        <select appSelect2 #rp_report_type id="rp_report_type" class="form-control"
                            [(ngModel)]="reportParms.rp_report_type" name="rp_report_type" required
                            (selectionChanged)="OnReportTypeChange($event);">
                            <option value="details">Details</option>
                            <option value="consolidated">Consolidated</option>
                            <option value="product">Product Wise</option>
                            <option value="customer">Customer Wise</option>
                            <option value="category">Category Wise</option>
                            <option value="status">Status Wise</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <form [formGroup]="dateRangeForm">
                        <mat-form-field class="example-form-field">
                            <mat-label for="srp_date_range">Enter a date range</mat-label>
                            <mat-date-range-input [rangePicker]="rangePicker">
                                <input matStartDate formControlName="start" />
                                <input matEndDate formControlName="end" />
                            </mat-date-range-input>
                            <mat-hint>MM/DD/YYYY – MM/DD/YYYY</mat-hint>
                            <mat-datepicker-toggle matIconSuffix [for]="rangePicker"></mat-datepicker-toggle>
                            <mat-date-range-picker #rangePicker>
                                <mat-date-range-picker-actions>
                                    <button mat-button matDateRangePickerCancel>Cancel</button>
                                    <button mat-raised-button matDateRangePickerApply>Apply</button>
                                </mat-date-range-picker-actions>
                            </mat-date-range-picker>
                        </mat-form-field>
                    </form>
                </div>

                <div class="col-md-3">
                    <div class="form-group mt-4">
                        <button class="btn btn-primary" (click)="getOrderReport()"> <i class="fa fa-search"></i>
                            Search</button>
                    </div>
                </div>
            </div>
            <hr />
            <div class="row">
                <div class="col-md-12">
                    <button type="button" class="btn btn-outline-secondary pull-right" (click)="onExport()"><i
                            class="fa fa-file-excel-o" aria-hidden="true"></i> Export to Excel</button>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <ag-grid-angular #reportGrid class="ag-theme-quartz ag-theme-acmecorp"
                        style="height: 100%; width: 100%;" [rowData]="reportdata" [columnDefs]="colDefs"
                        [defaultColDef]="defaultColDef" [enableCellTextSelection]="true" [domLayout]="domLayout"
                        [components]="frameworkComponents" [pagination]="true"
                        [pinnedBottomRowData]="pinnedBottomRowData" (filterChanged)="onFilterChanged()"
                        [getRowStyle]="getRowStyleScheduled" [paginationPageSize]="paginationPageSize15"
                        [paginationPageSizeSelector]="paginationPageSizeSelector15" (gridReady)="onGridReady($event)">
                    </ag-grid-angular>
                </div>
            </div>

        </div>
    </div>
</div>
