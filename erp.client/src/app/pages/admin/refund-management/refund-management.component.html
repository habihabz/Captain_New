<div class="right_col" role="main" style="min-height: 99vh;">
    <!-- BREADCRUMBS -->
    <div class="row mb-1">
        <div class="col-md-12">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb px-0 mb-2" style="background: transparent;">
                    <li class="breadcrumb-item"><a href="#/dashboard" class="text-muted small">Home</a></li>
                    <li class="breadcrumb-item active text-dark fw-bold small">Refund Management</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="row">
        <div class="col-md-12 col-sm-12">

            <!-- TABS NAVIGATION -->
            <div class="d-flex mb-0">
                <button (click)="setTab('pending')"
                    class="nav-tab px-4 py-3 border-0 transition-all fw-bold d-flex align-items-center"
                    [ngClass]="activeTab === 'pending' ? 'active-tab shadow-sm' : 'inactive-tab'">
                    <i class="fa fa-clock-o me-2"></i>
                    <span>Pending Payouts</span>
                    <span class="badge bg-danger ms-2"
                        *ngIf="activeTab === 'pending' && rowCount > 0">{{rowCount}}</span>
                </button>
                <button (click)="setTab('completed')"
                    class="nav-tab px-4 py-3 border-0 transition-all fw-bold d-flex align-items-center"
                    [ngClass]="activeTab === 'completed' ? 'active-tab shadow-sm' : 'inactive-tab'">
                    <i class="fa fa-history me-2"></i>
                    <span>Payout History</span>
                </button>
            </div>

            <div class="x_panel shadow-sm border-0 bg-white"
                style="border-radius: 0 12px 12px 12px; border-top: 4px solid #198754 !important;">
                <div class="x_title border-0 pb-0 mb-0">
                    <div class="row align-items-end g-3 p-4">
                        <!-- Left: Info Text -->
                        <div class="col-md-3">
                            <div class="d-flex flex-column mb-1">
                                <h5 class="fw-bold text-dark mb-1" style="font-size: 16px;">
                                    <i
                                        class="fa {{ activeTab === 'pending' ? 'fa-hourglass-half text-warning' : 'fa-check-circle text-success' }} me-2"></i>
                                    {{ activeTab === 'pending' ? 'Pending Settlements' : 'Payout History' }}
                                </h5>
                                <span class="text-muted" style="font-size: 11px;">
                                    {{ activeTab === 'pending' ? 'Review and process online refunds' : 'View record of
                                    completed transactions' }}
                                </span>
                            </div>
                        </div>

                        <!-- Center: Context-Aware Filters -->
                        <div class="col-md-7">
                            <div class="row g-3">
                                <!-- Order Search (Common to both) -->
                                <div [class]="activeTab === 'pending' ? 'col-md-6' : 'col-md-4'">
                                    <label class="small fw-bold text-muted text-uppercase mb-2 d-block" style="font-size: 10px; letter-spacing: 0.5px;">Search Order</label>
                                    <div class="input-group input-group-sm shadow-xs rounded-3 overflow-hidden border">
                                        <span class="input-group-text bg-white border-0 pe-1">
                                            <i class="fa fa-search text-muted small"></i>
                                        </span>
                                        <input type="number" class="form-control border-0 shadow-none ps-1"
                                            [(ngModel)]="requestParms.id" placeholder="Enter Order ID"
                                            (keyup.enter)="applyFilters()">
                                    </div>
                                </div>

                                <!-- Date Range (ONLY for Payout History) -->
                                <div class="col-md-5" *ngIf="activeTab === 'completed'">
                                    <label class="small fw-bold text-muted text-uppercase mb-2 d-block" style="font-size: 10px; letter-spacing: 0.5px;">Filter By Date</label>
                                    <div class="input-group input-group-sm shadow-xs rounded-3 overflow-hidden border">
                                        <span class="input-group-text bg-white border-0 pe-1">
                                            <i class="fa fa-calendar-o text-muted small"></i>
                                        </span>
                                        <input type="text" appDateRange class="form-control border-0 shadow-none ps-1"
                                            placeholder="Select Date Range" 
                                            [startDate]="requestParms.startDate" 
                                            [endDate]="requestParms.endDate"
                                            (rangeChanged)="onDateRangeChanged($event)">
                                    </div>
                                </div>

                                <!-- Filter Buttons -->
                                <div class="col-md-3 d-flex align-items-end gap-2">
                                    <button class="btn btn-sm btn-primary rounded-3 px-3 fw-bold shadow-sm" style="height: 31px;" (click)="applyFilters()">
                                        FILTER
                                    </button>
                                    <button class="btn btn-sm btn-light border rounded-3 px-2 shadow-xs" style="height: 31px;" (click)="resetFilters()" title="Reset">
                                        <i class="fa fa-undo text-muted"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Right: Actions -->
                        <div class="col-md-2 text-end">
                            <button class="btn btn-sm btn-outline-success rounded-pill px-3 fw-bold shadow-xs border-2"
                                (click)="loadData()">
                                <i class="fa fa-refresh me-2"></i> REFRESH
                            </button>
                        </div>
                    </div>
                </div>

                <div class="x_content pt-4">
                    <!-- INFORMATION LAYOUT REMOVED FROM HERE -->

                    <!-- DATA GRID -->
                    <div class="grid-card p-0 border rounded shadow-sm overflow-hidden bg-white">
                        <ag-grid-angular #refundGrid style="width: 100%; height: 500px;"
                            class="ag-theme-quartz ag-theme-acmecorp" [rowData]="refundableOrders"
                            [columnDefs]="activeTab === 'pending' ? pendingColDefs : historyColDefs" [pagination]="true"
                            [paginationPageSize]="10" (gridReady)="onGridReady($event)">
                        </ag-grid-angular>
                    </div>


                </div>
            </div>
        </div>
    </div>
</div>
