<div class="right_col" role="main" style="min-height: 99vh;">
    <!-- Header / Breadcrumbs -->
    <div class="px-4 py-4 bg-white border-bottom shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <nav aria-label="breadcrumb" class="mb-2">
                    <ol class="breadcrumb mb-0 text-uppercase fw-bold" style="letter-spacing: 1.5px; font-size: 10px;">
                        <li class="breadcrumb-item"><a routerLink="/dashboard" class="text-decoration-none text-teal">Admin Console</a></li>
                        <li class="breadcrumb-item active text-muted" aria-current="page">Product Reviews</li>
                    </ol>
                </nav>
                <h3 class="mb-0 fw-bold text-dark d-flex align-items-center">
                    Product Reviews 
                    <span class="ms-3 badge rounded-pill bg-teal-soft text-teal fs-6 fw-medium">
                        {{reviews.length}} Reviews
                    </span>
                </h3>
            </div>

            <!-- Toolbar -->
            <div class="d-flex gap-2">
                <div class="input-group search-pill" style="width: 280px;">
                    <span class="input-group-text bg-white border-end-0"><i class="fa fa-search text-muted"></i></span>
                    <input type="text" 
                           class="form-control border-start-0" 
                           placeholder="Search reviews..." 
                           (input)="onQuickFilterChanged($event)">
                </div>
            </div>
        </div>
    </div>

    <!-- Data Grid Container -->
    <div class="flex-grow-1 p-4 overflow-hidden">
        <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden">
            <ag-grid-angular
                style="width: 100%; height: 100%;"
                class="ag-theme-acmecorp h-100"
                [rowData]="reviews"
                [columnDefs]="columnDefs"
                [defaultColDef]="{
                    resizable: true,
                    flex: 1,
                    minWidth: 100
                }"
                [pagination]="true"
                [paginationPageSize]="20"
                [animateRows]="true"
                (gridReady)="onGridReady($event)"
                rowSelection="multiple">
            </ag-grid-angular>
        </div>
    </div>
</div>
