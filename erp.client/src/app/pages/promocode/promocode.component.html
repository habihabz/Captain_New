<div class="right_col d-flex flex-column" role="main" style="padding-top: 10px; height: 100vh; overflow: hidden;">
    <!-- Breadcrumbs (Fixed) -->
    <div class="row mb-3 flex-shrink-0">
        <div class="col-12 px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb bg-transparent p-0 m-0">
                    <li class="breadcrumb-item text-muted small">Master Data</li>
                    <li class="breadcrumb-item active text-dark fw-bold small" aria-current="page">Promo Code Management
                    </li>
                </ol>
            </nav>
            <div class="d-flex justify-content-between align-items-center mt-1">
                <h3 class="fw-bold text-dark m-0" style="font-size: 1.5rem;">Promo Code Master</h3>
                <div class="d-flex gap-2 align-items-center">
                    <span class="text-muted small fw-bold">Active Promo:</span>
                    <span class="badge bg-soft-success text-success px-3 py-1 rounded-pill fw-bold"
                        style="background: rgba(45, 206, 137, 0.15); font-size: 12px;">{{ promocodes.length }}
                        Entities</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Panel -->
    <div class="x_panel border-0 shadow-sm rounded-4 mx-2 mb-3 flex-grow-1 d-flex flex-column overflow-hidden">
        <div class="x_title border-0 pb-0 px-3 pt-4 flex-shrink-0">
            <div class="row align-items-center g-3">
                <div class="col-md-auto">
                    <button class="btn btn-success btn-pill shadow-sm hover-lift px-4 d-flex align-items-center"
                        (click)="createPromocode()" style="background: #1abb9c; border-color: #1abb9c;">
                        <i class="fa fa-plus-circle me-2"></i> CREATE
                    </button>
                </div>
            </div>
            <div class="clearfix"></div>
        </div>

        <div class="x_content p-3 flex-grow-1 overflow-hidden">
            <ag-grid-angular #promocodeGrid style="width: 100%; height: 100%;" class="ag-theme-quartz ag-theme-acmecorp"
                [rowData]="promocodes" [columnDefs]="colDefs" [defaultColDef]="defaultColDef" [pagination]="true"
                [paginationPageSize]="20" [domLayout]="'normal'" [components]="frameworkComponents"
                (gridReady)="onGridReady($event)">
            </ag-grid-angular>
        </div>
    </div>
</div>

<!-- PROMO CODE FORM MODAL -->
<div class="modal fade" id="promocodeFormModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="modal-header bg-teal text-white py-3 px-4 border-0" style="background: #1abb9c;">
                <h5 class="fw-bold m-0">{{ promocode.pc_id ? 'Update' : 'Create' }} Promo Code</h5>
                <button type="button" class="btn-close btn-close-white" data-dismiss="modal"
                    aria-label="Close" >x</button>
            </div>
            <div class="modal-body p-4 pt-4">
                <form #promoForm="ngForm">
                    <div class="row g-4">
                        <!-- Full Row: Promo Code -->
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2"
                                style="letter-spacing: 0.5px;">Promo Code</label>
                            <input type="text"
                                class="form-control form-control-lg border-0 bg-light rounded-3 px-3 shadow-none"
                                style="font-size: 15px; height: 48px;" placeholder="e.g. SUMMER50"
                                [(ngModel)]="promocode.pc_code" name="pc_code" required>
                        </div>

                        <!-- Half Row: Discount & Status -->
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2"
                                style="letter-spacing: 0.5px;">Discount (%)</label>
                            <input type="number" class="form-control border-0 bg-light rounded-3 shadow-none"
                                style="height: 42px;" [(ngModel)]="promocode.pc_discount_perc" name="pc_discount_perc">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2"
                                style="letter-spacing: 0.5px;">Status</label>
                            <select class="form-control border-0 bg-light rounded-3 shadow-none"
                                style="height: 42px; cursor: pointer;" [(ngModel)]="promocode.pc_active_yn"
                                name="pc_active_yn">
                                <option value="Y">Active</option>
                                <option value="N">Inactive</option>
                            </select>
                        </div>

                        <!-- Half Row: Min Order & Max Discount -->
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2"
                                style="letter-spacing: 0.5px;">Min Order Amt</label>
                            <div class="input-group shadow-none bordre-0">
                                <span class="input-group-text border-0 bg-light text-muted"
                                    style="border-radius: 8px 0 0 8px;">₹</span>
                                <input type="number" class="form-control border-0 bg-light shadow-none"
                                    style="height: 42px; border-radius: 0 8px 8px 0;"
                                    [(ngModel)]="promocode.pc_min_order_amount" name="pc_min_order_amount">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2"
                                style="letter-spacing: 0.5px;">Max Discount</label>
                            <div class="input-group shadow-none">
                                <span class="input-group-text border-0 bg-light text-muted"
                                    style="border-radius: 8px 0 0 8px;">₹</span>
                                <input type="number" class="form-control border-0 bg-light shadow-none"
                                    style="height: 42px; border-radius: 0 8px 8px 0;"
                                    [(ngModel)]="promocode.pc_max_discount_amount" name="pc_max_discount_amount">
                            </div>
                        </div>

                        <!-- Full Row: Expiry Date -->
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted text-uppercase mb-2"
                                style="letter-spacing: 0.5px;">Expiry Date</label>
                            <input type="date" class="form-control border-0 bg-light rounded-3 shadow-none"
                                style="height: 45px;" [(ngModel)]="promocode.pc_expiry_date" name="pc_expiry_date">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-2 pb-5 d-flex justify-content-center gap-3">
                <button type="button" class="btn btn-secondary px-5 py-2 rounded-pill fw-bold text-uppercase"
                    style="letter-spacing: 1px; font-size: 13px; background: #858fa1; border: none;"
                    data-dismiss="modal">Cancel</button>
                <button type="button" class="btn text-white px-5 py-2 rounded-pill fw-bold text-uppercase shadow-sm"
                    (click)="savePromocode()"
                    style="background: #1abb9c; border: none; letter-spacing: 1px; font-size: 13px;">
                    {{ promocode.pc_id ? 'Update' : 'Create' }} Promo Code
                </button>
            </div>
        </div>
    </div>
</div>
